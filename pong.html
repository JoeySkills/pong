<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PONG">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>PONG</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    background: #0a0a0f;
    width: 100%; height: 100%;
    overflow: hidden;
    user-select: none;
    touch-action: none;
  }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Courier New', monospace;
  }

  #header {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 8px;
    flex-shrink: 0;
  }

  h1 {
    color: #fff;
    font-size: clamp(1.4rem, 5vw, 2.4rem);
    letter-spacing: 0.35em;
    font-weight: 900;
    text-shadow: 0 0 30px rgba(255,255,255,0.4);
    line-height: 1;
  }

  .subtitle {
    color: #444;
    font-size: 0.6rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-top: 3px;
  }

  .arena {
    position: relative;
    border: 2px solid #1e1e2e;
    border-radius: 6px;
    overflow: hidden;
    flex-shrink: 0;
    box-shadow: 0 0 60px rgba(120,80,255,0.1);
  }

  canvas { display: block; }

  /* Touch zone labels shown below canvas */
  .touch-hints {
    display: flex;
    justify-content: space-between;
    width: 100%;
    margin-top: 8px;
    padding: 0 4px;
    flex-shrink: 0;
  }
  .touch-hint {
    font-size: 0.55rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    opacity: 0.35;
  }
  .touch-hint.p1 { color: #7ab4ff; }
  .touch-hint.p2 { color: #ff7a9c; text-align: right; }

  #startMsg {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #fff;
    font-family: 'Courier New', monospace;
    font-size: clamp(0.65rem, 2.5vw, 0.9rem);
    letter-spacing: 0.15em;
    text-align: center;
    pointer-events: none;
    white-space: nowrap;
    animation: blink 1.2s ease-in-out infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.2; }
  }
</style>
</head>
<body>

<div id="header">
  <h1>PONG</h1>
  <p class="subtitle">Two Player Classic</p>
</div>

<div class="arena" id="arena">
  <canvas id="c"></canvas>
  <div id="startMsg">TAP TO START</div>
</div>

<div class="touch-hints">
  <div class="touch-hint p1">← Player 1 · drag left</div>
  <div class="touch-hint p2">drag right · Player 2 →</div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const startMsg = document.getElementById('startMsg');
const arena = document.getElementById('arena');
const header = document.getElementById('header');
const hints = document.querySelector('.touch-hints');

// ── Sizing ──────────────────────────────────────────────────────────────────
// Portrait layout: canvas fills most of the screen vertically
// Ball travels left/right (horizontal), paddles on left & right edges
let S = 1;

function resize() {
  const hh = header.offsetHeight + 8;
  const th = hints.offsetHeight + 8;
  const pad = 16;
  const availW = window.innerWidth - pad;
  const availH = window.innerHeight - hh - th - pad;

  // Keep landscape-ish ratio but fit portrait screens
  const ratio = 420 / 680;
  let cw, ch;
  if (availW / availH < 1 / ratio) {
    // Width-constrained (typical portrait phone)
    cw = availW;
    ch = Math.min(availH, cw / (1 - ratio + 0.05));
  } else {
    ch = availH;
    cw = availW;
  }

  cw = Math.floor(cw);
  ch = Math.floor(ch);

  canvas.width = cw;
  canvas.height = ch;
  canvas.style.width = cw + 'px';
  canvas.style.height = ch + 'px';

  S = cw / 680;
  if (ball) {
    p1.x = 18 * S;
    p1.y = Math.max(PAD_H()/2, Math.min(H() - PAD_H()/2, p1.y));
    p2.x = W() - 18 * S - PAD_W();
    p2.y = Math.max(PAD_H()/2, Math.min(H() - PAD_H()/2, p2.y));
    ball.x = Math.min(Math.max(ball.x, BALL_R()), W() - BALL_R());
    ball.y = Math.min(Math.max(ball.y, BALL_R()), H() - BALL_R());
  }
}

window.addEventListener('resize', resize);

// ── Constants ────────────────────────────────────────────────────────────────
const WIN_SCORE = 7;
const PAD_W = () => Math.max(10, 12 * S);
const PAD_H = () => Math.max(48, 70 * S);
const BALL_R = () => Math.max(6, 8 * S);
const PAD_SPEED = () => 5.5 * S;
const INITIAL_SPEED = () => Math.max(3, 5 * S);
const W = () => canvas.width;
const H = () => canvas.height;

// ── State ────────────────────────────────────────────────────────────────────
let state = 'idle';
let scores = [0, 0];
let ball, p1, p2;
let keys = {};
let particles = [];
let flashTimer = 0, flashSide = -1;

// Touch tracking: map touchId → { player (0|1), lastY }
let touches = {};

function initRound(scorer) {
  const vx = scorer === undefined ? (Math.random() < .5 ? 1 : -1) : (scorer === 0 ? 1 : -1);
  const angle = Math.random() * 0.5 - 0.25;
  ball = {
    x: W()/2, y: H()/2,
    vx: INITIAL_SPEED() * vx,
    vy: INITIAL_SPEED() * Math.sin(angle),
    speed: INITIAL_SPEED()
  };
  p1 = { x: 18 * S, y: H()/2 };
  p2 = { x: W() - 18*S - PAD_W(), y: H()/2 };
}

// ── Particles ────────────────────────────────────────────────────────────────
function spawnParticles(x, y, color) {
  for (let i = 0; i < 14; i++) {
    const a = Math.random() * Math.PI * 2;
    const spd = (1.5 + Math.random() * 3.5) * S;
    particles.push({ x, y, vx: Math.cos(a)*spd, vy: Math.sin(a)*spd, life: 1, color });
  }
}
function updateParticles() {
  for (let i = particles.length-1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vy += .08*S; p.life -= .038;
    if (p.life <= 0) particles.splice(i, 1);
  }
}
function drawParticles() {
  for (const p of particles) {
    ctx.save(); ctx.globalAlpha = p.life; ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, 3*S*p.life, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }
}

// ── Draw ─────────────────────────────────────────────────────────────────────
function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y); ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r); ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h); ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r); ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
}

function draw() {
  ctx.fillStyle = '#0a0a0f';
  ctx.fillRect(0, 0, W(), H());

  if (flashTimer > 0) {
    ctx.fillStyle = flashSide === 0 ? 'rgba(100,200,255,0.07)' : 'rgba(255,100,150,0.07)';
    ctx.fillRect(0, 0, W(), H());
    flashTimer--;
  }

  // Touch zone tint (subtle)
  if (state === 'playing' || state === 'idle') {
    ctx.fillStyle = 'rgba(91,163,255,0.02)';
    ctx.fillRect(0, 0, W()/2, H());
    ctx.fillStyle = 'rgba(255,90,138,0.02)';
    ctx.fillRect(W()/2, 0, W()/2, H());
  }

  // Center line
  ctx.strokeStyle = '#1e1e2e'; ctx.lineWidth = 2*S;
  ctx.setLineDash([8*S, 10*S]);
  ctx.beginPath(); ctx.moveTo(W()/2, 0); ctx.lineTo(W()/2, H()); ctx.stroke();
  ctx.setLineDash([]);

  // Scores
  const sz = Math.floor(40 * S);
  ctx.font = `900 ${sz}px 'Courier New'`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  ctx.globalAlpha = 0.12; ctx.fillStyle = '#fff';
  ctx.fillText(scores[0], W()/2 - 80*S, 14*S);
  ctx.fillText(scores[1], W()/2 + 80*S, 14*S);
  ctx.globalAlpha = 1;
  const sz2 = Math.floor(32*S);
  ctx.font = `900 ${sz2}px 'Courier New'`;
  ctx.fillStyle = '#7ab4ff'; ctx.fillText(scores[0], W()/2 - 80*S, 16*S);
  ctx.fillStyle = '#ff7a9c'; ctx.fillText(scores[1], W()/2 + 80*S, 16*S);

  const pr = 4*S;

  // P1 paddle
  const g1 = ctx.createLinearGradient(p1.x, p1.y-PAD_H()/2, p1.x+PAD_W(), p1.y+PAD_H()/2);
  g1.addColorStop(0,'#5ba3ff'); g1.addColorStop(1,'#2060cc');
  ctx.fillStyle = g1; ctx.shadowColor = '#5ba3ff'; ctx.shadowBlur = 14*S;
  roundRect(p1.x, p1.y-PAD_H()/2, PAD_W(), PAD_H(), pr); ctx.fill();

  // P2 paddle
  const g2 = ctx.createLinearGradient(p2.x, p2.y-PAD_H()/2, p2.x+PAD_W(), p2.y+PAD_H()/2);
  g2.addColorStop(0,'#ff5a8a'); g2.addColorStop(1,'#cc2050');
  ctx.fillStyle = g2; ctx.shadowColor = '#ff5a8a'; ctx.shadowBlur = 14*S;
  roundRect(p2.x, p2.y-PAD_H()/2, PAD_W(), PAD_H(), pr); ctx.fill();
  ctx.shadowBlur = 0;

  // Ball
  if (state !== 'idle') {
    const bg = ctx.createRadialGradient(ball.x-2*S, ball.y-2*S, 1*S, ball.x, ball.y, BALL_R());
    bg.addColorStop(0,'#ffffff'); bg.addColorStop(.5,'#e0d0ff'); bg.addColorStop(1,'#9060ff');
    ctx.fillStyle = bg; ctx.shadowColor = '#b090ff'; ctx.shadowBlur = 20*S;
    ctx.beginPath(); ctx.arc(ball.x, ball.y, BALL_R(), 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
  }

  drawParticles();

  if (state === 'gameover') {
    ctx.fillStyle = 'rgba(10,10,15,0.8)';
    ctx.fillRect(0, 0, W(), H());
    const winner = scores[0] >= WIN_SCORE ? 1 : 2;
    ctx.fillStyle = winner === 1 ? '#7ab4ff' : '#ff7a9c';
    ctx.font = `900 ${Math.floor(26*S)}px 'Courier New'`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(`PLAYER ${winner} WINS`, W()/2, H()/2 - 20*S);
    ctx.fillStyle = '#555';
    ctx.font = `${Math.floor(10*S)}px 'Courier New'`;
    ctx.fillText('TAP TO PLAY AGAIN', W()/2, H()/2 + 18*S);
  }
}

// ── Update ────────────────────────────────────────────────────────────────────
function update() {
  if (state !== 'playing') return;

  // Keyboard
  if (keys['w']||keys['W']) p1.y -= PAD_SPEED();
  if (keys['s']||keys['S']) p1.y += PAD_SPEED();
  if (keys['ArrowUp'])   p2.y -= PAD_SPEED();
  if (keys['ArrowDown']) p2.y += PAD_SPEED();

  const half = PAD_H()/2;
  p1.y = Math.max(half, Math.min(H()-half, p1.y));
  p2.y = Math.max(half, Math.min(H()-half, p2.y));

  ball.x += ball.vx; ball.y += ball.vy;

  if (ball.y - BALL_R() <= 0) { ball.y = BALL_R(); ball.vy = Math.abs(ball.vy); }
  if (ball.y + BALL_R() >= H()) { ball.y = H()-BALL_R(); ball.vy = -Math.abs(ball.vy); }

  function padHit(pad) {
    return ball.x - BALL_R() < pad.x + PAD_W() &&
           ball.x + BALL_R() > pad.x &&
           ball.y > pad.y - half && ball.y < pad.y + half;
  }

  if (ball.vx < 0 && padHit(p1)) {
    ball.x = p1.x + PAD_W() + BALL_R();
    const rel = (ball.y - p1.y) / half;
    ball.speed = Math.min(ball.speed * 1.05, 16*S);
    ball.vx = ball.speed * Math.cos(rel * 0.8);
    ball.vy = ball.speed * Math.sin(rel * 0.8);
    spawnParticles(ball.x, ball.y, '#7ab4ff');
  }
  if (ball.vx > 0 && padHit(p2)) {
    ball.x = p2.x - BALL_R();
    const rel = (ball.y - p2.y) / half;
    ball.speed = Math.min(ball.speed * 1.05, 16*S);
    ball.vx = -ball.speed * Math.cos(rel * 0.8);
    ball.vy =  ball.speed * Math.sin(rel * 0.8);
    spawnParticles(ball.x, ball.y, '#ff7a9c');
  }

  if (ball.x < -BALL_R()*2) {
    scores[1]++; flashSide=1; flashTimer=18;
    spawnParticles(20*S, H()/2, '#ff7a9c'); checkGameOver(1);
  }
  if (ball.x > W()+BALL_R()*2) {
    scores[0]++; flashSide=0; flashTimer=18;
    spawnParticles(W()-20*S, H()/2, '#7ab4ff'); checkGameOver(0);
  }

  updateParticles();
}

function checkGameOver(scorer) {
  if (scores[0] >= WIN_SCORE || scores[1] >= WIN_SCORE) {
    state = 'gameover';
    startMsg.textContent = 'TAP TO PLAY AGAIN';
    startMsg.style.display = 'block';
  } else {
    state = 'idle';
    initRound(scorer);
    startMsg.textContent = 'TAP TO CONTINUE';
    startMsg.style.display = 'block';
  }
}

function startGame() {
  scores = [0,0]; initRound(); state = 'playing';
  startMsg.style.display = 'none';
}

// ── Input: Keyboard ───────────────────────────────────────────────────────────
window.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.key === ' ') {
    e.preventDefault();
    if (state === 'idle') { state = 'playing'; startMsg.style.display = 'none'; }
    else if (state === 'gameover') startGame();
  }
  if (['ArrowUp','ArrowDown'].includes(e.key)) e.preventDefault();
});
window.addEventListener('keyup', e => { keys[e.key] = false; });

// ── Input: Touch ──────────────────────────────────────────────────────────────
// Each finger controls the paddle on its half of the screen.
// Finger on left half → P1 (blue). Right half → P2 (pink).
// Moving finger up/down moves that paddle directly.

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    const rect = canvas.getBoundingClientRect();
    const tx = t.clientX - rect.left;
    const ty = t.clientY - rect.top;
    const player = tx < W()/2 ? 0 : 1;
    touches[t.identifier] = { player, lastY: ty };

    // Snap paddle to finger y on first touch
    const half = PAD_H()/2;
    if (player === 0) p1.y = Math.max(half, Math.min(H()-half, ty));
    else              p2.y = Math.max(half, Math.min(H()-half, ty));
  }
  // Start / continue game on tap
  if (state === 'idle') { state = 'playing'; startMsg.style.display = 'none'; }
  else if (state === 'gameover') startGame();
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    const info = touches[t.identifier];
    if (!info) continue;
    const rect = canvas.getBoundingClientRect();
    const ty = t.clientY - rect.top;
    const half = PAD_H()/2;
    if (info.player === 0) p1.y = Math.max(half, Math.min(H()-half, ty));
    else                   p2.y = Math.max(half, Math.min(H()-half, ty));
    info.lastY = ty;
  }
}, { passive: false });

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  for (const t of e.changedTouches) delete touches[t.identifier];
}, { passive: false });

canvas.addEventListener('touchcancel', e => {
  for (const t of e.changedTouches) delete touches[t.identifier];
}, { passive: false });

// ── Input: Mouse ──────────────────────────────────────────────────────────────
canvas.addEventListener('click', e => {
  if (state === 'idle') { state = 'playing'; startMsg.style.display = 'none'; }
  else if (state === 'gameover') startGame();
});

canvas.addEventListener('mousemove', e => {
  if (state !== 'playing') return;
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const half = PAD_H()/2;
  if (mx < W()/2) p1.y = Math.max(half, Math.min(H()-half, my));
  else            p2.y = Math.max(half, Math.min(H()-half, my));
});

// ── Boot ──────────────────────────────────────────────────────────────────────
resize();
initRound();

function loop() { update(); draw(); requestAnimationFrame(loop); }
loop();

// Register service worker for PWA
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/service-worker.js')
      .then(reg => console.log('Service Worker registered'))
      .catch(err => console.log('Service Worker registration failed:', err));
  });
}
</script>
</body>
</html>
